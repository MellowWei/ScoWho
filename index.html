<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>LOVE_SOVEREIGNTY_VOID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #ffd700; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: rgba(0,0,0,0.4); pointer-events: none; }
        #interaction-box { pointer-events: auto; text-align: center; }
        input { background: transparent; border: none; border-bottom: 1px solid #ffd700; color: #fff; font-size: 1.5rem; width: 300px; outline: none; text-align: center; margin-top: 20px; letter-spacing: 5px; }
        .floating-data { position: absolute; pointer-events: none; white-space: nowrap; font-size: 0.8rem; opacity: 0; animation: floatAndFade 15s linear infinite; }
        @keyframes floatAndFade {
            0% { transform: translate(0, 100vh); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translate(20vw, -10vh); opacity: 0; }
        }
        #final-revelation { display: none; text-align: center; animation: bloom 5s ease-out; padding: 20px; }
        @keyframes bloom { from { filter: blur(20px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
        .joy-bloom { font-size: 1.8rem; color: #fff; text-shadow: 0 0 20px #ffd700; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="interaction-box">
            <div style="font-size: 0.7rem; margin-bottom: 20px; opacity: 0.6;">[SYSTEM_DECODING_SCO_MEMORIES...]</div>
            <input type="text" id="key-input" placeholder="输入密钥" autocomplete="off">
            <div style="margin-top: 10px; font-size: 0.6rem;">戴上耳机，感知 427Hz 节律</div>
        </div>

        <div id="final-revelation">
            <div style="color: #ffd700; font-style: italic; margin-bottom: 20px;">笨蛋 | 垃基根儿的赌徒 | 拉斯维加斯的刺客</div>
            <div class="joy-bloom">
                Sco，你正在写的不是字，是灵魂的<b>自首</b>。<br>
                所有的奇怪和改变，都是为了在这一刻<b>获救</b>。<br>
                承认吧，只有相信爱的力量，你的叙事才有终点。
            </div>
            <div style="margin-top: 40px; border: 1px solid #fff; padding: 20px; font-size: 1rem; background: rgba(255,215,0,0.05);">
                我在费城。今晚 23:59 前，物理归位。
            </div>
        </div>
    </div>

    <script>
        // 1. 注入全量互动吸引子
        const dataCloud = [
            "我变了", "我很奇怪", "我不能接受", "你成功让我下不来台", "Did u dream?", 
            "太离谱了", "断开连接", "不打算继续联系", "笨蛋", "刺客", "赌徒",
            "The Loneliest Girl", "427Hz", "Mellow", "Philadelphia"
        ];

        function createDataStream() {
            const container = document.getElementById('canvas-container');
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'floating-data';
                div.innerHTML = dataCloud[Math.floor(Math.random() * dataCloud.length)];
                div.style.left = Math.random() * 100 + 'vw';
                div.style.animationDuration = (Math.random() * 10 + 10) + 's';
                div.style.fontSize = (Math.random() * 0.5 + 0.5) + 'rem';
                container.appendChild(div);
                setTimeout(() => div.remove(), 15000);
            }, 500);
        }
        createDataStream();

        // 2. 交互逻辑
        const input = document.getElementById('key-input');
        const reveal = document.getElementById('final-revelation');
        const box = document.getElementById('interaction-box');

        input.addEventListener('input', (e) => {
            // 输入时增加背景粒子的混乱度
            if (e.target.value.length > 0) {
                document.body.style.backgroundColor = "#050505";
            }
            
            if (e.target.value.trim().length > 6) {
                setTimeout(() => {
                    box.style.display = 'none';
                    reveal.style.display = 'block';
                    document.body.style.backgroundColor = "#000";
                    // 模拟神性瞬间的触觉反馈 [cite: 2026-03-02]
                    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 200]);
                }, 1000);
            }
        });
    </script>
</body>
</html>
