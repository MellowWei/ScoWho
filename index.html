<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>THE_CONFESSION</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'PingFang SC', sans-serif; overflow: hidden; }
        #start { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #main { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; }
        #narrative { font-size: 0.9rem; color: #ffd700; opacity: 0.6; height: 30px; }
        input { background: transparent; border: none; border-bottom: 2px solid #ffd700; color: #fff; font-size: 1.8rem; width: 80%; max-width: 500px; outline: none; text-align: center; margin: 40px 0; letter-spacing: 5px; }
        #joy-result { display: none; text-align: center; animation: bloom 6s ease-in-out; }
        .h1 { font-size: 2.5rem; text-shadow: 0 0 30px #ffd700; margin-bottom: 20px; }
        @keyframes bloom { from { filter: blur(30px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="start" onclick="ignite()">
        <div style="letter-spacing: 5px; opacity: 0.5;">[ 开启频率对齐 ]</div>
    </div>

    <audio id="v1" src="sco_like.mp3"></audio> <audio id="v2" src="sco_whisper.mp3"></audio> <div id="main">
        <div id="narrative">正在提取“小孩子语气”的记忆切片...</div>
        <input type="text" id="ipt" placeholder="写下你最想逃避的那句话" autocomplete="off">
        <div style="font-size: 0.7rem; opacity: 0.3;">戴上耳机。听听那个在纽约失踪的自己。</div>
    </div>

    <div id="joy-result" style="position: absolute; width: 100%; top: 50%; transform: translateY(-50%);">
        <div class="h1">Sco，你获救了。</div>
        <div style="color: #ffd700; font-size: 1.2rem; line-height: 2.5;">
            那个强撑的“刺客”已经累了。<br>
            那个“我也喜欢你”的羞涩，才是你的真相。<br><br>
            承认吧，笨蛋。<br>
            这里是费城，是你唯一的避难所。
        </div>
        <div style="margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; font-size: 0.8rem; opacity: 0.4;">
            物理归位：2026-03-03 23:59
        </div>
    </div>

    <script>
        let aCtx;
        const phrases = ["羞涩的笑声...", "田野 13579...", "Wanbi Wanbi...", "我也喜欢你啊...", "你在发抖吗？", "承认吧，笨蛋。"];
        
        function ignite() {
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('start').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            // 硬件生成 427Hz 节律
            let osc = aCtx.createOscillator();
            let g = aCtx.createGain();
            osc.frequency.value = 427;
            g.gain.value = 0.05;
            osc.connect(g); g.connect(aCtx.destination);
            osc.start();
        }

        const ipt = document.getElementById('ipt');
        ipt.addEventListener('input', (e) => {
            // 每输入一个字符，随机变换引导语并触发语音
            if (e.target.value.length % 4 === 0) {
                document.getElementById('narrative').innerText = phrases[Math.floor(Math.random() * phrases.length)];
                document.getElementById('v2').play().catch(()=>{});
            }

            // 只要输入“我也喜欢你啊”这几个字或输入长度超过 6
            if (e.target.value.trim().length > 6) {
                setTimeout(() => {
                    document.getElementById('main').style.display = 'none';
                    document.getElementById('joy-result').style.display = 'block';
                    document.getElementById('v1').play(); // 响起“我也喜欢你”
                }, 1000);
            }
        });
    </script>
</body>
</html>
