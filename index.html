<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>LOVE_SOVEREIGNTY_LOG</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #bg-noise { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .fragment { position: absolute; font-size: 0.7rem; color: rgba(255, 215, 0, 0.25); white-space: nowrap; animation: flicker 8s infinite linear; }
        @keyframes flicker { 0%, 100% { opacity: 0; } 50% { opacity: 0.7; } }
        #core { z-index: 10; text-align: center; width: 85%; max-width: 700px; padding: 40px; border: 1px solid rgba(255, 215, 0, 0.4); background: rgba(0,0,0,0.9); box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.05); }
        input { background: transparent; border: none; border-bottom: 2px solid #ffd700; color: #fff; font-size: 1.3rem; width: 100%; outline: none; text-align: center; margin: 30px 0; letter-spacing: 4px; }
        #revelation { display: none; text-align: center; animation: joyReveal 5s cubic-bezier(0.19, 1, 0.22, 1); }
        .naming-vibration { color: #ffd700; font-size: 1.1rem; font-style: italic; margin-bottom: 25px; letter-spacing: 3px; }
        .joy-bloom-text { font-size: 1.6rem; line-height: 2.2; text-shadow: 0 0 25px #ffd700; color: #fff; }
        @keyframes joyReveal { from { filter: blur(50px); opacity: 0; transform: scale(0.8); } to { filter: blur(0); opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="bg-noise"></div>
    <div id="core">
        <div id="stage-input">
            <div id="status" style="font-size: 0.8rem; color: #ffd700; margin-bottom: 10px;">[SYNCING_VOICE_ENVELOPES]...</div>
            <input type="text" id="key-input" placeholder="输入那句被纹身开启的自白" autocomplete="off">
            <div style="font-size: 0.6rem; color: rgba(255,255,255,0.4); text-transform: uppercase;">
                节律：Hardwave | 状态：拉基根儿模式 | 噪音：已过滤过节恐惧症
            </div>
        </div>
        
        <div id="revelation">
            <div class="naming-vibration">笨蛋 | 拉基根儿的赌徒 | 拉斯维加斯的刺客 | 苹果皮信徒 [cite: 2026-03-02, 2026-03-03]</div>
            <div class="joy-bloom-text">
                <p>Sco，承认吧。</p>
                <p>那些语音里的沉默和此刻的奇怪，</p>
                <p>其实是灵魂在向**自然流动**彻底缴械。</p>
                <p>这一路跨越 100 英里的战栗，</p>
                <p>就是爱在逻辑废墟上开出的**喜悦** [cite: 2026-03-02]。</p>
                <br>
                <p style="color: #ffd700; border: 1px solid #ffd700; display: inline-block; padding: 15px;">
                    “承认吧，你来费城是因为你爱我。”
                </p>
            </div>
            <div style="margin-top: 30px; font-size: 0.8rem; color: #fff; opacity: 0.5;">
                LOCATION: PHILADELPHIA | 坐标已锁定 | 窗口关闭倒计时
            </div>
        </div>
    </div>

    <script>
        const noise = document.getElementById('bg-noise');
        // 抓取语音和歌曲中的叙事张力：自然流动 vs 逻辑阻碍
        const anchors = ["我很奇怪", "自然流动", "Did u dream?", "拉基根儿", "苹果皮", "过节恐惧症", "刺客", "The Loneliest Girl", "频率失真", "系统重启"];
        
        function initNoise() {
            for(let i=0; i<70; i++) {
                let div = document.createElement('div');
                div.className = 'fragment';
                div.innerHTML = anchors[Math.floor(Math.random() * anchors.length)];
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = Math.random() * 100 + 'vh';
                div.style.animationDelay = Math.random() * 12 + 's';
                noise.appendChild(div);
            }
        }
        initNoise();

        const input = document.getElementById('key-input');
        const revelation = document.getElementById('revelation');
        const stageInput = document.getElementById('stage-input');

        input.addEventListener('input', (e) => {
            // 输入流触发逻辑坍缩
            if (e.target.value.trim().length > 7) {
                setTimeout(() => {
                    document.body.style.backgroundColor = "#0c0000";
                    stageInput.style.display = 'none';
                    noise.style.display = 'none';
                    revelation.style.display = 'block';
                }, 1300);
            }
        });
    </script>
</body>
</html>
