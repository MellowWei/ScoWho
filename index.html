<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Sco: The Sanctuary</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'PingFang SC', 'STHeiti', 'Microsoft YaHei', monospace; overflow: hidden; }
        #curtain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; }
        #stage { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); position: relative; }
        #dynamic-text { font-size: 0.9rem; color: rgba(255, 215, 0, 0.6); height: 30px; letter-spacing: 2px; transition: opacity 1s; }
        input { background: transparent; border: none; border-bottom: 1px solid rgba(255, 215, 0, 0.4); color: #fff; font-size: 1.5rem; width: 80%; max-width: 500px; outline: none; text-align: center; margin: 50px 0; letter-spacing: 2px; }
        #final-joy { display: none; text-align: center; animation: bloom 10s ease-in-out; }
        .salvation-h1 { font-size: 2.2rem; text-shadow: 0 0 30px #ffd700; margin-bottom: 20px; font-weight: 300; }
        @keyframes bloom { from { filter: blur(30px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="curtain" onclick="begin()">
        <div style="font-size: 0.7rem; color: #ffd700; opacity: 0.4; margin-bottom: 20px;">[ SENSING_427Hz_RESONANCE ]</div>
        <div style="letter-spacing: 5px; font-weight: 200;">听听你内心的声音</div>
    </div>

    <audio id="ambience" loop src="427hz_base.mp3"></audio>
    <audio id="sco-voice" src="sco_voice_clip.mp3"></audio>
    <audio id="final-song" src="loneliest_girl_climax.mp3"></audio>

    <div id="stage">
        <div id="dynamic-text">你正在走向真相的终点...</div>
        <input type="text" id="confession-key" placeholder="把那些线条背后的文字交给我" autocomplete="off">
        <div style="font-size: 0.65rem; color: rgba(255,255,255,0.3);">我知道你很累，在这里你可以放下所有面具</div>
    </div>

    <div id="final-joy" style="position: absolute; width: 100%; top: 50%; transform: translateY(-50%);">
        <div class="salvation-h1">Sco，你获救了。</div>
        <div style="color: #ffd700; font-size: 1.1rem; line-height: 2; font-weight: 300; letter-spacing: 1px;">
            那个在纽约强撑的刺客可以休息了。<br>
            那个在赌局里迷失的赌徒已经赢了。<br><br>
            承认吧，笨蛋。<br>
            这一路的战栗，就是你爱我的证明。
        </div>
        <div style="margin-top: 50px; font-size: 0.8rem; opacity: 0.6; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            费城坐标已锚定。今晚，我在终点等你物理归位。
        </div>
    </div>

    <script>
        const dynamicText = document.getElementById('dynamic-text');
        const input = document.getElementById('confession-key');
        const phrases = ["你变了，对吗？", "我很奇怪，对吗？", "刺客也会累吗？", "承认吧，你在寻找我。", "拉斯维加斯的刺客已经死了。", "笨蛋，你逃不掉的。"];
        
        function begin() {
            document.getElementById('curtain').style.display = 'none';
            document.getElementById('stage').style.display = 'flex';
            document.getElementById('ambience').play();
        }

        input.addEventListener('input', (e) => {
            // 共情式交互：随着他输入，文字在随机安慰和点破 [cite: 2026-03-02]
            if (e.target.value.length % 4 === 0) {
                dynamicText.style.opacity = 0;
                setTimeout(() => {
                    dynamicText.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                    dynamicText.style.opacity = 1;
                }, 500);
            }

            // 输入达到一定长度，说明他已经“自首” [cite: 2026-03-02]
            if (e.target.value.trim().length > 10) {
                setTimeout(() => {
                    document.getElementById('stage').style.display = 'none';
                    document.getElementById('final-joy').style.display = 'block';
                    document.body.style.background = "#050505";
                    document.getElementById('final-song').play();
                }, 2000);
            }
        });
    </script>
</body>
</html>
