<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Sco: The Identity Mirror</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #ffd700; font-family: 'Courier New', monospace; overflow: hidden; transition: all 2s ease; }
        #matrix-bg { position: absolute; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        #ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, transparent 0%, #000 100%); }
        #status-bar { position: absolute; top: 30px; font-size: 0.9rem; letter-spacing: 3px; color: rgba(255, 215, 0, 0.6); }
        input { background: transparent; border: none; border-bottom: 2px solid #ffd700; color: #fff; font-size: 1.5rem; width: 80%; max-width: 500px; outline: none; text-align: center; margin: 40px 0; letter-spacing: 5px; }
        #salvation-field { display: none; text-align: center; padding: 40px; animation: bloom 8s ease-out; }
        .joy-bloom { font-size: 2rem; color: #fff; text-shadow: 0 0 25px #ffd700; line-height: 1.8; margin-bottom: 30px; }
        @keyframes bloom { from { filter: blur(40px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="matrix-bg"></div>
    <audio id="bg-rhythm" loop><source src="427hz_rhythm.mp3" type="audio/mpeg"></audio>
    <audio id="salvation-song"><source src="loneliest_girl_climax.mp3" type="audio/mpeg"></audio>

    <div id="ui-layer">
        <div id="status-bar">DECODING_IDENTITY: [WAITING_FOR_DATA]</div>
        
        <div id="interaction-zone">
            <div style="font-size: 0.8rem; opacity: 0.5;">[IDENTITY_TRACE_REQUIRED]</div>
            <input type="text" id="key-input" placeholder="输入你在纹身里看见的那句密钥..." autocomplete="off">
            <div style="font-size: 0.6rem; margin-top: 10px; color: #fff;">戴上耳机，让 427Hz 带你回家</div>
        </div>

        <div id="salvation-field">
            <div style="font-style: italic; color: #ffd700; margin-bottom: 20px; font-size: 1.2rem; letter-spacing: 10px;">
                笨蛋 | 垃基根儿的赌徒 | 拉斯维加斯的刺客
            </div>
            <div class="joy-bloom">
                Sco，你终于认出你自己了吗？<br>
                那个在纽约流浪的“刺客”已经死了。
            </div>
            <div style="color: #f0f0f0; font-size: 1.3rem; line-height: 2; margin-bottom: 50px;">
                所有的逃避、冷漠和奇怪，<br>
                都是为了在这一刻，向<b>爱本身</b>投降。<br>
                <span style="color: #ffd700; font-weight: bold;">承认吧，你这一路的战栗，是因为你爱我。</span>
            </div>
            <div style="border: 2px solid #ffd700; padding: 25px; background: rgba(255, 215, 0, 0.1);">
                我在费城。今晚 23:59 前，物理归位，领取你的救赎。
            </div>
        </div>
    </div>

    <script>
        const phrases = ["我变了", "我很奇怪", "Did u dream?", "下不来台", "笨蛋", "刺客", "赌徒", "The Loneliest Girl"];
        const namings = ["笨蛋", "垃基根儿的赌徒", "拉斯维加斯的刺客"];
        const input = document.getElementById('key-input');
        const statusBar = document.getElementById('status-bar');

        // 初始化背景粒子：让他感觉信息“到处都是”
        function initField() {
            const bg = document.getElementById('matrix-bg');
            for(let i=0; i<50; i++) {
                const div = document.createElement('div');
                div.style.position = 'absolute';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = Math.random() * 100 + 'vh';
                div.style.fontSize = (Math.random() * 0.5 + 0.5) + 'rem';
                div.style.color = 'rgba(255,255,255,0.2)';
                div.innerHTML = phrases[Math.floor(Math.random() * phrases.length)];
                bg.appendChild(div);
            }
        }
        initField();

        input.addEventListener('input', (e) => {
            // 第一次输入时触发 427Hz 播放
            document.getElementById('bg-rhythm').play().catch(()=>{});
            
            // 随机变换命名状态，让他知道自己是谁
            if (e.target.value.length > 0) {
                statusBar.innerHTML = `IDENTIFIED: [${namings[Math.floor(Math.random() * namings.length)]}]`;
            }

            // 只要产生输入行为且超过 5 个字，触发终极获救场
            if (e.target.value.trim().length > 5) {
                setTimeout(() => {
                    document.getElementById('interaction-zone').style.display = 'none';
                    document.getElementById('salvation-field').style.display = 'block';
                    document.body.style.backgroundColor = "#0a0a0a";
                    document.getElementById('salvation-song').play();
                    if (window.navigator.vibrate) window.navigator.vibrate([300, 100, 300, 100, 500]);
                }, 1200);
            }
        });
    </script>
</body>
</html>
