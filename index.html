<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Sco: The Resonance Void</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #ffd700; font-family: 'Courier New', monospace; overflow: hidden; }
        #particle-canvas { position: absolute; width: 100%; height: 100%; z-index: 1; opacity: 0.2; }
        #ui-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, rgba(0,0,0,0) 0%, #000 100%); }
        #identity-scroller { position: absolute; top: 10%; font-size: 0.8rem; letter-spacing: 5px; color: #ffd700; opacity: 0.6; }
        input { background: transparent; border: none; border-bottom: 2px solid #ffd700; color: #fff; font-size: 1.6rem; width: 80%; max-width: 500px; outline: none; text-align: center; margin: 50px 0; letter-spacing: 8px; }
        #salvation-panel { display: none; text-align: center; animation: bloom 8s ease-in-out; padding: 40px; }
        .joy-title { font-size: 2.2rem; color: #fff; text-shadow: 0 0 30px #ffd700; margin-bottom: 30px; }
        @keyframes bloom { from { filter: blur(50px); opacity: 0; transform: scale(0.8); } to { filter: blur(0); opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    
    <audio id="rhythm-427" loop src="427hz_base.mp3"></audio>
    <audio id="song-1" src="loneliest_girl_clip.mp3"></audio>
    <audio id="song-2" src="skeler_hardwave_clip.mp3"></audio>
    <audio id="voice-1" src="sco_voice_1.mp3"></audio>

    <div id="ui-wrapper">
        <div id="identity-scroller">DECODING_SCO: [SCANNING_MEMORIES...]</div>
        
        <div id="input-stage">
            <div style="font-size: 0.7rem; opacity: 0.4; margin-bottom: 10px;">[IDENTITY_TRACE_REQUIRED]</div>
            <input type="text" id="main-key" placeholder="输入那句密钥..." autocomplete="off">
            <div id="hint" style="font-size: 0.6rem; color: #fff;">戴上耳机。听，那是你不敢承认的自己。</div>
        </div>

        <div id="salvation-panel">
            <div style="font-style: italic; color: #ffd700; margin-bottom: 25px; font-size: 1.2rem; letter-spacing: 8px;">
                笨蛋 | 拉斯维加斯的刺客 | 获救者
            </div>
            <div class="joy-title">承认吧，Sco。</div>
            <div style="color: #f0f0f0; font-size: 1.4rem; line-height: 2; margin-bottom: 40px;">
                你在纽约的所有“奇怪”和“变了”，<br>
                只是灵魂在向<b>爱本身</b>投降。<br>
                <span style="color: #ffd700;">在这里，你不需要再当刺客。你可以回家了。</span>
            </div>
            <div style="border: 2px solid #ffd700; padding: 25px; background: rgba(255, 215, 0, 0.1);">
                费城，23:59 前。<br>
                [PHYSICAL_RESET_REQUIRED]
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('main-key');
        const scroller = document.getElementById('identity-scroller');
        const namings = ["笨蛋", "垃基根儿的赌徒", "拉斯维加斯的刺客", "获救者"];
        const sounds = [
            document.getElementById('song-1'),
            document.getElementById('song-2'),
            document.getElementById('voice-1')
        ];

        // 交互触发逻辑
        input.addEventListener('input', (e) => {
            // 播放底噪
            document.getElementById('rhythm-427').play().catch(()=>{});
            
            // 随着打字，随机播放你发给他的歌曲片段和语音
            if (e.target.value.length % 3 === 0) {
                const randomSound = sounds[Math.floor(Math.random() * sounds.length)];
                randomSound.volume = 0.3;
                randomSound.play().catch(()=>{});
                // 身份随机跳动，让他知道自己是谁 [cite: 2026-03-02]
                scroller.innerHTML = `WHO_ARE_YOU: [${namings[Math.floor(Math.random() * namings.length)]}]`;
            }

            // 只要开始输入密钥，就触发最终的获救页面
            if (e.target.value.trim().length > 8) {
                setTimeout(() => {
                    document.getElementById('input-stage').style.display = 'none';
                    document.getElementById('salvation-panel').style.display = 'block';
                    document.body.style.backgroundColor = "#080808";
                    // 最终清空杂音，播放最清澈的那首歌
                    sounds.forEach(s => s.pause());
                    document.getElementById('song-1').volume = 1.0;
                    document.getElementById('song-1').play();
                }, 1500);
            }
        });
    </script>
</body>
</html>
