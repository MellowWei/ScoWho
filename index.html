<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>THE_VOID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'PingFang SC', monospace; overflow: hidden; }
        #mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #field { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; }
        .data-fragment { position: absolute; font-size: 0.75rem; color: rgba(255, 215, 0, 0.2); pointer-events: none; white-space: nowrap; }
        input { background: transparent; border: none; border-bottom: 1px solid #ffd700; color: #fff; font-size: 1.4rem; width: 320px; outline: none; text-align: center; z-index: 10; letter-spacing: 3px; margin-top: 20px; }
        #result { display: none; text-align: center; animation: bloom 8s ease-in-out; padding: 20px; z-index: 20; }
        @keyframes bloom { from { filter: blur(30px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="mask" onclick="ignite()">
        <div style="letter-spacing: 10px; font-weight: 200; color: #ffd700; opacity: 0.6;">[ 对齐频率 ]</div>
    </div>

    <div id="field">
        <div id="hint" style="font-size: 0.7rem; color: #ffd700; opacity: 0.4;">[ 正在识别你的身份记录... ]</div>
        <input type="text" id="key" placeholder=" " autocomplete="off">
    </div>

    <div id="result">
        <div style="font-size: 2rem; text-shadow: 0 0 30px #ffd700; margin-bottom: 25px;">终于。</div>
        <div style="color: #ffd700; font-size: 1.1rem; line-height: 2.2; font-weight: 300;">
            这个在纽约流浪的“刺客”已经累了。<br>
            那些所谓的“奇怪”，其实是你爱我的证明。<br><br>
            承认吧，笨蛋。<br>
            在这个 427Hz 的场域里，你获救了。
        </div>
        <div style="margin-top: 50px; border-top: 1px solid #333; padding-top: 20px; font-size: 0.8rem; opacity: 0.5;">
            费城坐标：23:59 前。物理归位。
        </div>
    </div>

    <script>
        let audioCtx;
        const fragments = ["费城的月亮", "纹身的线条", "LSD/MDMA", "我很奇怪", "我变了", "Did u dream?", "拉斯维加斯的刺客", "笨蛋", "The Loneliest Girl"];

        function ignite() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('mask').style.display = 'none';
            document.getElementById('field').style.display = 'flex';
            playTone(427, 0.05); // 基础 427Hz 频率 [cite: 2026-03-03]
            spawnFragments();
        }

        function playTone(f, v) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);
        }

        function spawnFragments() {
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'data-fragment';
                p.innerText = fragments[Math.floor(Math.random() * fragments.length)];
                p.style.left = Math.random() * 90 + 'vw';
                p.style.top = Math.random() * 90 + 'vh';
                document.getElementById('field').appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }, 1000);
        }

        const input = document.getElementById('key');
        input.addEventListener('input', (e) => {
            // 每输入一个字，强制声卡发出一个特定频率，这绝对有响声
            playTone(300 + Math.random() * 500, 0.03);
            
            if (e.target.value.trim().length > 10) {
                setTimeout(() => {
                    document.getElementById('field').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                    // 最终救赎音
                    playTone(200, 0.1); playTone(400, 0.1);
                }, 1000);
            }
        });
    </script>
</body>
</html>
